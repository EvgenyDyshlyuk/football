AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB table for local football matches.

Parameters:
  MatchesTableName:
    Type: String
    Default: football-matches

Resources:
  MatchesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref MatchesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  MatchesTableName:
    Description: Name of the matches DynamoDB table.
    Value: !Ref MatchesTable
